name: CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --redact --no-git=false --exit-code 1
          else
            gitleaks detect --source . --config .gitleaks.toml \
              --log-opts "HEAD~1..HEAD" --redact --no-git=false --exit-code 1
          fi

  lint:
    name: Lint
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  format:
    name: Format
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  type-check:
    name: Type Check
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test -- --coverage
      - name: Generate coverage badge JSON
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(Math.floor(s.total.lines.pct))")
            if [ "$PCT" -ge 80 ]; then COLOR="brightgreen"
            elif [ "$PCT" -ge 60 ]; then COLOR="yellow"
            else COLOR="red"
            fi
            echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > coverage/coverage-badge.json
            echo "Coverage: ${PCT}%"
            cat coverage/coverage-badge.json
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 30

  build:
    name: Build (Node ${{ matrix.node-version }})
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Validate package (dry-run publish)
        run: pnpm publish --dry-run --no-git-checks

  benchmark:
    name: Performance Benchmarks
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm run bench -- --reporter=json --outputFile=bench-results.json
        continue-on-error: true
      - name: Check for regressions (warn only)
        run: node scripts/bench-ci.mjs
        continue-on-error: true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.json
          retention-days: 30

  smoke-test:
    name: Smoke Test
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test - version flag
        run: node dist/index.js --version
      - name: Smoke test - help flag
        run: node dist/index.js --help
      - name: Smoke test - dry-run with template
        run: |
          node dist/index.js test-app --template react-next --dry-run --no-install
          # Verify it exits cleanly (exit code 0)

  audit:
    name: Security Audit
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  license-check:
    name: License Compliance
    needs: [secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run license-check

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [secret-scan, lint, format, type-check, test, build, audit, license-check, smoke-test]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "Secret Scan:     ${{ needs.secret-scan.result }}"
          echo "Lint:            ${{ needs.lint.result }}"
          echo "Format:          ${{ needs.format.result }}"
          echo "Type Check:      ${{ needs.type-check.result }}"
          echo "Test:            ${{ needs.test.result }}"
          echo "Build:           ${{ needs.build.result }}"
          echo "Audit:           ${{ needs.audit.result }}"
          echo "License Check:   ${{ needs.license-check.result }}"
          echo "Smoke Test:      ${{ needs.smoke-test.result }}"

          FAIL=0
          for gate in secret-scan lint format type-check test build audit license-check smoke-test; do
            result="skipped"
            case "$gate" in
              secret-scan)    result="${{ needs.secret-scan.result }}" ;;
              lint)           result="${{ needs.lint.result }}" ;;
              format)         result="${{ needs.format.result }}" ;;
              type-check)     result="${{ needs.type-check.result }}" ;;
              test)           result="${{ needs.test.result }}" ;;
              build)          result="${{ needs.build.result }}" ;;
              audit)          result="${{ needs.audit.result }}" ;;
              license-check)  result="${{ needs.license-check.result }}" ;;
              smoke-test)     result="${{ needs.smoke-test.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::Gate '$gate' did not succeed: $result"
              FAIL=1
            fi
          done

          if [[ "$FAIL" -eq 1 ]]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi

          echo "All quality gates passed!"
